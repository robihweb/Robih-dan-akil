<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Menyala ROBIH PRATAMA 🤙🔥</title>
    <style>
        /* --- Reset & Base --- */
        * {
            margin: 0;
            padding: 0;
            box-shadow: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0d0d0d; /* Ultra Dark Background */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            overflow-x: hidden;
        }

        /* --- Global Neon Glow Effect --- */
        ::selection {
            background-color: #ff3c00;
            color: white;
        }

        /* --- Header: ROBIH PRATAMA --- */
        header {
            width: 100%;
            text-align: center;
            margin-bottom: 50px;
        }

        .main-title {
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(90deg, #ff00ff, #ff8c00, #ff00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-glow 4s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 0, 255, 0.6));
        }

        /* --- Container for Neon Cards --- */
        .neon-card {
            background: rgba(255, 255, 255, 0.03); /* Translucent */
            padding: 30px;
            border-radius: 20px;
            border: 2px solid;
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .neon-card:hover {
            transform: translateY(-5px) scale(1.02);
        }

        .neon-card h2 {
            font-size: 1.6rem;
            margin-bottom: 25px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- BAGIAN 1: HASIL PERULANGAN --- */
        #output-card {
            border-color: #ff00ff; /* Purple Neon */
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        #output-card h2 {
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        #output-perulangan {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #ff00ff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 2;
            color: #ffddff; /* Light Pink text */
        }

        /* --- BAGIAN 2: DATA NILAI SISWA --- */
        #siswa-card {
            border-color: #ff8c00; /* Orange Neon (FIRE) */
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.3);
        }

        #siswa-card h2 {
            color: #ff8c00;
            text-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
            text-align: center;
        }

        table {
            border-collapse: separate;
            border-spacing: 0 10px; /* Space between rows */
            width: 100%;
            margin-top: 10px;
        }

        th, td {
            padding: 15px;
            text-align: left;
        }

        /* Standard Table Header */
        thead tr th {
            background-color: transparent;
            color: #cccccc;
            border-bottom: 2px solid rgba(255, 140, 0, 0.3);
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Customizing Index column */
        .index-col {
            color: #aaaaaa;
            font-style: italic;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        /* Each Row becomes a translucent "bar" */
        tbody tr {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        /* Special Hover effect on Rows */
        tbody tr:hover {
            background: rgba(255, 140, 0, 0.2);
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.3);
        }

        /* Value Column color */
        td.value-col {
            color: #ff8c00;
            font-weight: bold;
        }

        /* --- Keyframes for Animation --- */
        @keyframes gradient-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

    </style>
</head>
<body>

    <header>
        <h1 class="main-title">ROBIH DAN AQIL</h1>
    </header>

    <div class="neon-card" id="output-card">
        <h2>Hasil Perulangan Data</h2>
        <div id="output-perulangan"></div>
    </div>

    <div class="neon-card" id="siswa-card">
        <h2>Data Nilai Siswa</h2>
        <table id="tabel-siswa">
            <thead>
                <tr>
                    <th class="index-col"></th>
                    <th>Nama</th>
                    <th>Nilai</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        // 1. Data Perulangan (Ugu-Pink Theme)
        const dataAngka = [7, 8, 8, 9, 10, 10];
        const displayPerulangan = document.getElementById('output-perulangan');
        
        dataAngka.forEach((angka, i) => {
            displayPerulangan.innerHTML += `Elemen ke- ${i} = ${angka}<br>`;
        });

        // 2. Data Tabel Siswa (Orange-Fire Theme)
        const daftarSiswa = ["Andi", "Budi", "Cindi", "Dedy", "Edi"];
        const daftarNilai = [10, 9, 7, 8, 10];
        const tbody = document.querySelector('#tabel-siswa tbody');

        for (let i = 0; i < daftarSiswa.length; i++) {
            let baris = `<tr>
                <td class="index-col">${i}</td>
                <td>${daftarSiswa[i]}</td>
                <td class="value-col">${daftarNilai[i]}</td>
            </tr>`;
            tbody.innerHTML += baris;
        }
    </script>

</body>
</html>
